services:
    - type: web
      name: edcm-app
      runtime: python
      pythonVersion: 3.10
      buildCommand: |
          pip install -r requirements.txt
          cd frontend && npm install && npm run build && cd ..
          python manage.py collectstatic --noinput
      startCommand: python manage.py migrate && gunicorn --bind 0.0.0.0:${PORT:-8000} --workers 3 config.wsgi:application
      # Environment variables
      envVars:
          - key: PYTHON_VERSION
            value: 3.10
          - key: SECRET_KEY
            fromQuery: SECRET_KEY
          - key: DEBUG
            value: "False"
          - key: ALLOWED_HOSTS
            value: "*.onrender.com"
          - key: DATABASE_URL
            fromDatabase:
                name: edcm-postgres
                property: connectionString
          - key: CORS_ALLOWED_ORIGINS
            value: "https://*.onrender.com"
          - key: SECURE_SSL_REDIRECT
            value: "True"
          - key: SESSION_COOKIE_SECURE
            value: "True"
          - key: CSRF_COOKIE_SECURE
            value: "True"

      # Disk configuration
      disk:
          name: edcm-disk
          mountPath: /var/data
          sizeGB: 1

      # Health check
      healthCheckPath: /api/health/

      # Auto-deploy on push
      autoDeployOnPush: true

databases:
    - name: edcm-postgres
      databaseName: edcm_db
      user: postgres
      plan: free
      postgresMajorVersion: 15
