{% extends 'base.html' %}

{% block content %}
<h2>{% if object %}Edit{% else %}Create{% endif %} Document</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'document_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
